name: 무료주차 자동등록 (매주 일요일 12시)

on:
  schedule:
    - cron: '0 3 * * 0'   # UTC 03:00 = KST 12:00, 일요일
  workflow_dispatch:        # 수동 실행 (테스트용)

jobs:
  auto-register:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 무료주차 자동 조회·등록
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/cron-register.ts
